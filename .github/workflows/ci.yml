name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: black + mypy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev tools
        # 実行時依存（torch 等）は入れない。純ロジックの検査に必要なツールだけ。
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Black (format check)
        run: black --check --diff .

      - name: Mypy (type check)
        # black が失敗しても型エラーを同じ run で出す。
        if: ${{ !cancelled() }}
        run: mypy

  test:
    name: pytest
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          set -o pipefail
          pytest --cov --cov-report=term-missing | tee pytest-coverage.txt

      - name: Coverage to job summary
        if: ${{ !cancelled() }}
        run: |
          {
            echo '## Coverage'
            echo ''
            echo '```'
            cat pytest-coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
